name: Update league data

on:
  schedule:
    # Hourly. Adjust to taste -- e.g. tighter around your league's waiver
    # processing day, looser out of season.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data and compute stats
        run: node scripts/build.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ cache/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update league data"
            git push
          fi
