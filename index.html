<!doctype html>

  <title>FPL Draft League Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-bar">
      <h1 class="site-title">FPL Draft League</h1>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    </div>

      <a href="#history" data-route="history">History</a>
